<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – RAKSHAK Emergency Response System</title>
    <meta name="description" content="Sign in to RAKSHAK to access the Emergency Response Dashboard." />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .page-body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 68px);
            padding: 3rem 1.5rem;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 2rem;
        }

        .login-header h1 span {
            color: var(--primary);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        /* Subtle glow */
        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at top right, rgba(255,59,59,0.05), transparent 50%);
            pointer-events: none;
        }

        .forgot-pass {
            font-size: 0.82rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            display: inline-block;
            margin-top: 0.25rem;
        }

        .forgot-pass:hover {
            color: var(--text);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        .btn-google:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
        }

        .btn-google img {
            width: 18px;
            height: 18px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

    </style>
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <div class="logo-icon">🚑</div>
            <span>RAKSHAK</span>
        </a>
    </nav>

    <div class="page-body">
        <div class="login-wrapper">
            <div class="login-header">
                <h1>Welcome to <span>RAKSHAK</span></h1>
                <p style="color: var(--text-sub); margin-top: 0.5rem;">Sign in to access the system</p>
            </div>

            <div class="login-card">
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input id="email" type="email" class="form-control" placeholder="admin@rakshak.com" required>
                    </div>

                    <div class="form-group" style="margin-bottom: 0.5rem;">
                        <label class="form-label" style="display: flex; justify-content: space-between;">
                            Password
                            <button type="button" class="forgot-pass" id="forgot-btn" style="background:transparent; border:none; cursor:pointer;">Forgot Password?</button>
                        </label>
                        <input id="password" type="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn" style="margin-top: 1rem; width: 100%;">
                        Sign In
                    </button>
                </form>

                <div class="divider">or continue with</div>

                <button class="btn-google" id="google-btn">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                    Sign in with Google
                </button>
            </div>
            
            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">
                Emergency? Call <strong style="color: var(--primary);">108</strong> immediately.
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/app.js"></script>

    <script type="module">
        import { 
            auth, 
            googleProvider, 
            signInWithEmailAndPassword, 
            signInWithPopup, 
            sendPasswordResetEmail,
            onAuthStateChanged
        } from './js/firebase-config.js';

        // Redirect if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user && window.location.pathname.includes('login.html')) {
                window.location.href = 'index.html';
            }
        });

        const form = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const googleBtn = document.getElementById('google-btn');
        const forgotBtn = document.getElementById('forgot-btn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        // Normal Email Login
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) return;

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast('Success', 'Login successful. Redirecting...', 'success');
            } catch (err) {
                console.error(err);
                
                // Show a clean user-friendly message
                let msg = 'Invalid email or password.';
                if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
                if (err.code === 'auth/wrong-password') msg = 'Incorrect password.';
                if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Try resetting password.';
                
                showToast('Login Failed', msg, 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In';
            }
        });

        // Google Login
        googleBtn.addEventListener('click', async () => {
            googleBtn.disabled = true;
            googleBtn.innerHTML = '<span class="spinner" style="border-right-color:#fff; border-bottom-color:#fff;"></span> Connecting...';
            
            try {
                await signInWithPopup(auth, googleProvider);
                showToast('Success', 'Google Authentication successful.', 'success');
            } catch (err) {
                console.error(err);
                if (err.code !== 'auth/popup-closed-by-user') {
                    showToast('Authentication Error', err.message, 'error');
                }
                googleBtn.disabled = false;
                googleBtn.innerHTML = '<img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google"> Sign in with Google';
            }
        });

        // Forgot Password
        forgotBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            
            if (!email) {
                showToast('Email Required', 'Please enter your email address to reset password.', 'warning');
                emailInput.focus();
                return;
            }

            try {
                forgotBtn.innerText = 'Sending...';
                await sendPasswordResetEmail(auth, email);
                showToast('Reset Link Sent', 'Check your email for password reset instructions.', 'success');
                forgotBtn.innerText = 'Forgot Password?';
            } catch (err) {
                console.error(err);
                
                let msg = err.message;
                if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
                
                showToast('Reset Failed', msg, 'error');
                forgotBtn.innerText = 'Forgot Password?';
            }
        });

    </script>
</body>
</html>
